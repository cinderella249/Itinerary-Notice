<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="行程通知">
<meta name="theme-color" content="#00d4aa">
<meta name="description" content="個人行程管理與 LINE 通知發送">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>個人行程通知管理 v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0f1117;
    --surface:  #1a1d27;
    --surface2: #22263a;
    --border:   #2e3350;
    --accent:   #00d4aa;
    --accent2:  #3b82f6;
    --warn:     #f59e0b;
    --danger:   #ef4444;
    --purple:   #a78bfa;
    --text:     #e8eaf6;
    --muted:    #6b7280;
    --radius:   12px;
    --mono:     'DM Mono', monospace;
    --sans:     'Noto Sans TC', sans-serif;
    --safe-top:    env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    overflow-x: hidden;
  }

  /* ── PWA 安裝提示橫幅 ── */
  #install-banner {
    display: none;
    background: linear-gradient(135deg, #0d2a22, #1a3d30);
    border-bottom: 1px solid var(--accent);
    padding: 10px 16px;
    align-items: center;
    gap: 10px;
    padding-top: calc(10px + var(--safe-top));
  }
  #install-banner.show { display: flex; }
  #install-banner .ib-text { flex: 1; font-size: 13px; }
  #install-banner .ib-text strong { color: var(--accent); }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
    padding-top: var(--safe-top);
    height: calc(56px + var(--safe-top));
  }
  .logo { font-size: 16px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
  .logo span { color: var(--text); font-weight: 300; }
  .version-tag {
    font-family: var(--mono); font-size: 10px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--muted); padding: 2px 7px; border-radius: 20px;
  }
  .header-r { margin-left: auto; display: flex; gap: 8px; align-items: center; }
  .sync-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--muted); transition: background .3s;
  }
  .sync-dot.ok   { background: var(--accent); }
  .sync-dot.err  { background: var(--danger); animation: pulse 1s infinite; }
  .sync-dot.loading { background: var(--warn); animation: pulse .6s infinite; }
  @keyframes pulse { 50% { opacity: .3; } }

  /* ── Nav tabs (bottom on mobile) ── */
  nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 90;
    padding-bottom: var(--safe-bottom);
  }
  .nav-tab {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 8px 4px; gap: 3px;
    color: var(--muted); font-size: 10px;
    cursor: pointer; background: none; border: none;
    font-family: var(--sans); transition: color .2s;
    -webkit-appearance: none;
  }
  .nav-tab .icon { font-size: 20px; line-height: 1; }
  .nav-tab.active { color: var(--accent); }
  .nav-tab .badge-count {
    position: absolute;
    top: 6px; right: calc(50% - 18px);
    background: var(--danger);
    color: #fff; font-size: 9px;
    width: 16px; height: 16px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    display: none;
  }
  .nav-tab { position: relative; }

  /* ── Pages ── */
  .page { display: none; flex-direction: column; padding-bottom: calc(64px + var(--safe-bottom)); }
  .page.active { display: flex; }

  /* ── 頁面：行程 ── */
  #page-schedules {}

  /* 統計橫排 */
  .stats-row {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 8px; padding: 12px 16px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    text-align: center;
  }
  .stat-card .num { font-size: 22px; font-weight: 700; font-family: var(--mono); color: var(--accent); }
  .stat-card .lbl { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .stat-card.warn .num { color: var(--warn); }
  .stat-card.info .num { color: var(--accent2); }
  .stat-card.fix  .num { color: var(--purple); }

  /* 工具列 */
  .toolbar {
    display: flex; gap: 8px; align-items: center;
    padding: 0 16px 10px;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  .toolbar::-webkit-scrollbar { display: none; }
  .filter-chip {
    padding: 5px 14px; border-radius: 20px;
    border: 1px solid var(--border); background: transparent;
    color: var(--muted); cursor: pointer; font-size: 12px;
    font-family: var(--sans); white-space: nowrap;
    transition: all .15s; -webkit-appearance: none;
  }
  .filter-chip.active {
    background: var(--accent); border-color: var(--accent);
    color: #000; font-weight: 600;
  }

  /* 搜尋 */
  .search-bar { padding: 0 16px 10px; }
  .search-bar input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    padding: 9px 14px;
    font-size: 14px; font-family: var(--sans);
  }
  .search-bar input:focus { outline: none; border-color: var(--accent); }

  /* 行程列表 */
  #schedule-list { padding: 0 16px; display: flex; flex-direction: column; gap: 8px; }

  .scard {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    display: flex; gap: 12px; align-items: flex-start;
    animation: fadeIn .25s ease;
    transition: border-color .2s;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(5px) } to { opacity:1; transform:none } }
  .scard:active { opacity: .85; }
  .scard.is-today  { border-color: var(--accent); background: #0a1f1a; }
  .scard.is-soon   { border-color: var(--warn); }
  .scard.is-past   { opacity: .45; }
  .scard.is-fixed  { border-left: 3px solid var(--purple); }

  .scard-date {
    min-width: 46px; text-align: center;
    padding-top: 2px;
  }
  .scard-date .day  { font-size: 24px; font-weight: 700; font-family: var(--mono); line-height: 1; }
  .scard-date .mon  { font-size: 10px; color: var(--muted); }
  .scard-date .diff {
    font-size: 10px; font-family: var(--mono);
    color: var(--accent); margin-top: 3px;
  }
  .scard-date .diff.past    { color: var(--muted); }
  .scard-date .diff.is-today{ color: var(--warn); font-weight: 700; }

  .scard-body { flex: 1; min-width: 0; }
  .scard-top  { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 5px; }
  .scard-title { font-size: 14px; font-weight: 600; }
  .badge {
    font-size: 10px; padding: 2px 7px; border-radius: 20px;
    font-weight: 600; white-space: nowrap;
  }
  .badge-type  { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .badge-pri   { background: #1e3a5f; color: var(--accent2); }
  .badge-pri.重要 { background: #3d2600; color: var(--warn); }
  .badge-pri.緊急 { background: #3d0000; color: var(--danger); }
  .badge-fixed { background: #1e1040; color: var(--purple); }

  .scard-meta { font-size: 11px; color: var(--muted); display: flex; flex-wrap: wrap; gap: 8px; }

  .scard-foot {
    margin-top: 10px; padding-top: 10px;
    border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  }
  .nb {
    width: 24px; height: 18px; border-radius: 4px;
    font-size: 9px; font-family: var(--mono);
    display: flex; align-items: center; justify-content: center; font-weight: 700;
  }
  .nb.on  { background: var(--accent); color: #000; }
  .nb.off { background: var(--surface2); color: var(--border); }
  .status-chip {
    font-size: 10px; padding: 2px 8px; border-radius: 20px; font-family: var(--mono);
  }
  .sc-sent    { background: #0d2a1c; color: var(--accent); border: 1px solid #1a4a30; }
  .sc-pending { background: #2a1800; color: var(--warn); border: 1px solid #4a3000; }
  .sc-waiting { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .sc-fixed   { background: #1e1040; color: var(--purple); border: 1px solid #3d2080; }

  .scard-actions { display: flex; gap: 5px; margin-left: auto; }

  /* FAB 新增按鈕 */
  .fab {
    position: fixed; bottom: calc(68px + var(--safe-bottom)); right: 16px;
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--accent); border: none;
    font-size: 26px; cursor: pointer; z-index: 85;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(0,212,170,.4);
    transition: transform .15s;
    -webkit-appearance: none;
  }
  .fab:active { transform: scale(.92); }

  /* ── 頁面：設定 ── */
  #page-settings { padding: 16px; gap: 16px; }
  .settings-section { display: flex; flex-direction: column; gap: 10px; }
  .settings-section h3 { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
  .settings-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .settings-card label { font-size: 12px; color: var(--muted); }
  .settings-card input,
  .settings-card select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 10px 12px;
    font-size: 13px; font-family: var(--sans);
    width: 100%;
  }
  .settings-card input:focus { outline: none; border-color: var(--accent); }
  .settings-card textarea {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text);
    padding: 10px 12px; font-size: 12px; font-family: var(--mono);
    width: 100%; min-height: 50px; resize: none;
  }
  .info-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
  .info-row .val { color: var(--accent); font-family: var(--mono); font-size: 12px; }

  /* ── Buttons ── */
  .btn {
    padding: 9px 18px; border-radius: 9px; border: none;
    cursor: pointer; font-size: 13px; font-family: var(--sans);
    font-weight: 500; transition: all .15s; white-space: nowrap;
    -webkit-appearance: none;
  }
  .btn-primary  { background: var(--accent); color: #000; }
  .btn-primary:active { filter: brightness(1.1); }
  .btn-outline  { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-outline:active { border-color: var(--accent); color: var(--accent); }
  .btn-warn     { background: var(--warn); color: #000; }
  .btn-danger   { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
  .btn-sm       { padding: 5px 11px; font-size: 12px; border-radius: 7px; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn-full     { width: 100%; }

  /* ── Modal ── */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.75);
    backdrop-filter: blur(6px);
    z-index: 200; display: none;
    align-items: flex-end; justify-content: center;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    width: 100%; max-width: 600px;
    max-height: 92vh;
    overflow-y: auto;
    padding: 20px 20px calc(20px + var(--safe-bottom));
    animation: slideUp .28s ease;
  }
  @keyframes slideUp { from { transform:translateY(100%) } to { transform:none } }
  .modal-handle {
    width: 40px; height: 4px; background: var(--border);
    border-radius: 2px; margin: 0 auto 16px;
  }
  .modal h3 { font-size: 17px; margin-bottom: 18px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  .form-group label { font-size: 12px; color: var(--muted); }
  .form-group input,
  .form-group select,
  .form-group textarea {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 9px; color: var(--text);
    padding: 11px 13px; font-size: 14px; font-family: var(--sans);
    transition: border-color .15s; width: 100%;
  }
  .form-group input:focus,
  .form-group select:focus { outline: none; border-color: var(--accent); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .check-row { display: flex; gap: 20px; flex-wrap: wrap; }
  .check-item {
    display: flex; align-items: center; gap: 7px;
    font-size: 14px; cursor: pointer; padding: 4px 0;
  }
  .check-item input[type=checkbox],
  .check-item input[type=radio] { accent-color: var(--accent); width: 16px; height: 16px; }
  .modal-footer {
    display: flex; gap: 10px; margin-top: 20px;
    padding-top: 16px; border-top: 1px solid var(--border);
  }
  .modal-footer .btn { flex: 1; padding: 12px; font-size: 14px; }

  /* 聯絡人快選 */
  .contact-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .contact-chip {
    padding: 4px 12px; border-radius: 20px;
    background: var(--surface2); border: 1px solid var(--border);
    font-size: 12px; cursor: pointer; transition: all .15s;
    -webkit-appearance: none; color: var(--text);
  }
  .contact-chip:active { background: var(--accent); color: #000; border-color: var(--accent); }

  /* 發送預覽 */
  .send-preview {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px;
    font-size: 13px; line-height: 1.8;
    white-space: pre-wrap; font-family: var(--mono);
    color: #a0d4c4; margin: 10px 0; max-height: 180px; overflow-y: auto;
  }
  .recipient-chips { display: flex; gap: 6px; flex-wrap: wrap; margin: 8px 0; }
  .rchip {
    padding: 3px 10px; border-radius: 20px; font-size: 12px;
    background: var(--surface2); border: 1px solid var(--border);
  }

  /* ── Empty / Loading ── */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty .big { font-size: 44px; margin-bottom: 10px; }
  .loading { text-align: center; padding: 50px 20px; color: var(--muted); }
  .spinner {
    width: 28px; height: 28px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: calc(72px + var(--safe-bottom)); left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 20px;
    font-size: 13px; z-index: 999; opacity: 0;
    transition: all .3s ease; white-space: nowrap; pointer-events: none;
    max-width: 90vw;
  }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  #toast.success { border-color: var(--accent); color: var(--accent); }
  #toast.error   { border-color: var(--danger); color: var(--danger); }

  /* ── 桌面佈局調整 ── */
  @media (min-width: 768px) {
    nav { position: fixed; left: 0; top: calc(56px + var(--safe-top)); bottom: 0; width: 72px; flex-direction: column; border-top: none; border-right: 1px solid var(--border); padding-bottom: 0; }
    .nav-tab { flex: none; padding: 16px 4px; font-size: 11px; }
    .page { padding-bottom: 0; padding-left: 72px; }
    .fab { bottom: 24px; right: 24px; }
    .overlay { align-items: center; }
    .modal { border-radius: 16px; max-width: 540px; }
    .stats-row { grid-template-columns: repeat(4, 1fr); max-width: 700px; }
    #toast { bottom: 24px; }
    #install-banner { justify-content: center; }
  }
</style>
</head>
<body>

<!-- PWA 安裝提示 -->
<div id="install-banner">
  <div class="ib-text">
    <strong>加入主畫面</strong>，像 App 一樣使用
  </div>
  <button class="btn btn-primary btn-sm" id="install-btn">安裝</button>
  <button class="btn btn-outline btn-sm" onclick="document.getElementById('install-banner').classList.remove('show')">略過</button>
</div>

<header>
  <div class="logo">行程通知<span>管理</span></div>
  <span class="version-tag">v2</span>
  <div class="header-r">
    <div class="sync-dot" id="sync-dot" title="連線狀態"></div>
    <button class="btn btn-outline btn-sm" onclick="loadData()">同步</button>
  </div>
</header>

<!-- 底部導覽 -->
<nav>
  <button class="nav-tab active" id="tab-schedules" onclick="showPage('schedules')">
    <span class="icon">📅</span>行程
    <span class="badge-count" id="badge-pending"></span>
  </button>
  <button class="nav-tab" id="tab-contacts" onclick="showPage('contacts')">
    <span class="icon">👤</span>聯絡人
  </button>
  <button class="nav-tab" id="tab-settings" onclick="showPage('settings')">
    <span class="icon">⚙️</span>設定
  </button>
</nav>

<!-- ── 頁面：行程 ── -->
<div class="page active" id="page-schedules">
  <div class="stats-row">
    <div class="stat-card">     <div class="num" id="s-total">–</div><div class="lbl">全部</div></div>
    <div class="stat-card warn"><div class="num" id="s-soon">–</div> <div class="lbl">7天內</div></div>
    <div class="stat-card info"><div class="num" id="s-today">–</div><div class="lbl">今日</div></div>
    <div class="stat-card fix"> <div class="num" id="s-fixed">–</div><div class="lbl">固定</div></div>
  </div>
  <div class="toolbar">
    <button class="filter-chip active" onclick="setFilter('all',this)">全部</button>
    <button class="filter-chip" onclick="setFilter('today',this)">今日</button>
    <button class="filter-chip" onclick="setFilter('upcoming',this)">即將</button>
    <button class="filter-chip" onclick="setFilter('fixed',this)">固定</button>
    <button class="filter-chip" onclick="setFilter('past',this)">過期</button>
  </div>
  <div class="search-bar">
    <input type="search" placeholder="搜尋行程名稱、類型…" oninput="renderList()" id="q">
  </div>
  <div id="schedule-list">
    <div class="loading"><div class="spinner"></div>正在連線到 Google Sheets…</div>
  </div>
</div>

<!-- ── 頁面：聯絡人 ── -->
<div class="page" id="page-contacts">
  <div style="padding:16px;display:flex;flex-direction:column;gap:12px">
    <div style="font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em">個人聯絡人</div>
    <div id="contact-list" style="display:flex;flex-direction:column;gap:8px">
      <div class="loading"><div class="spinner"></div></div>
    </div>
    <div style="font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:8px">群組</div>
    <div id="group-list" style="display:flex;flex-direction:column;gap:8px">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<!-- ── 頁面：設定 ── -->
<div class="page" id="page-settings">
  <div class="settings-section">
    <h3>連線設定</h3>
    <div class="settings-card">
      <label>Apps Script 網址</label>
      <input type="url" id="api-url"
        placeholder="https://script.google.com/macros/s/..."
        value="https://script.google.com/macros/s/AKfycbxM6wfqPMy088w6hoRGX3j9FlUf1AUlmTEetkqXCLA6do3L2IFHSd4byFV41iXKl_Hm/exec">
      <button class="btn btn-primary btn-full" onclick="saveAndConnect()">儲存並連線</button>
    </div>

    <h3 style="margin-top:8px">關於</h3>
    <div class="settings-card">
      <div class="info-row"><span>版本</span><span class="val">v2</span></div>
      <div class="info-row"><span>Excel 版本</span><span class="val">v5</span></div>
      <div class="info-row" id="last-sync-row"><span>上次同步</span><span class="val" id="last-sync">–</span></div>
      <div class="info-row"><span>行程筆數</span><span class="val" id="info-count">–</span></div>
    </div>

<script>
// ══════════════════════════════════════════════════════════
//  設定
// ══════════════════════════════════════════════════════════
const DEFAULT_API = 'https://script.google.com/macros/s/AKfycbxM6wfqPMy088w6hoRGX3j9FlUf1AUlmTEetkqXCLA6do3L2IFHSd4byFV41iXKl_Hm/exec';

// ══════════════════════════════════════════════════════════
//  狀態
// ══════════════════════════════════════════════════════════
let schedules  = [];
let contacts   = [];
let groups     = [];
let editRow    = null;
let sendTarget = null;
let filterMode = 'all';

// ══════════════════════════════════════════════════════════
//  初始化
// ══════════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  // 載入儲存的 API URL（若無則用預設）
  const saved = localStorage.getItem('gas_url') || DEFAULT_API;
  document.getElementById('api-url').value = saved;
  loadData();
});

// Service Worker 註冊
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// PWA 安裝提示
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').classList.add('show');
});
function installPWA() {
  if (!deferredPrompt) { toast('請從瀏覽器選單選擇「加入主畫面」', 'success'); return; }
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => {
    deferredPrompt = null;
    document.getElementById('install-banner').classList.remove('show');
  });
}
document.getElementById('install-btn').addEventListener('click', installPWA);
document.getElementById('install-btn-2').addEventListener('click', installPWA);
window.addEventListener('appinstalled', () => {
  document.getElementById('install-banner').classList.remove('show');
  toast('已成功安裝！', 'success');
});

// ══════════════════════════════════════════════════════════
//  頁面切換
// ══════════════════════════════════════════════════════════
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

// ══════════════════════════════════════════════════════════
//  API
// ══════════════════════════════════════════════════════════
function API() { return document.getElementById('api-url').value.trim() || DEFAULT_API; }

function setSyncDot(state) {
  const d = document.getElementById('sync-dot');
  d.className = 'sync-dot ' + state;
}

async function loadData() {
  setSyncDot('loading');
  document.getElementById('schedule-list').innerHTML =
    '<div class="loading"><div class="spinner"></div>同步中…</div>';

  try {
    const url = API();
    const [sRes, cRes] = await Promise.all([
      fetch(url + '?action=schedules'),
      fetch(url + '?action=contacts'),
    ]);
    const sData = await sRes.json();
    const cData = await cRes.json();

    if (!sData.success) throw new Error(sData.error || '讀取失敗');

    schedules = (sData.data || []).map(normalise);
    contacts  = cData.contacts || [];
    groups    = cData.groups   || [];

    const now = new Date().toLocaleTimeString('zh-TW');
    document.getElementById('last-sync').textContent = now;
    document.getElementById('info-count').textContent = schedules.length + ' 筆';

    setSyncDot('ok');
    updateStats();
    renderList();
    renderContactPage();
    buildQuickChips();
    toast('同步完成', 'success');
  } catch(e) {
    setSyncDot('err');
    document.getElementById('schedule-list').innerHTML =
      `<div class="empty"><div class="big">⚠️</div>連線失敗<br><small style="font-size:12px">${e.message}</small></div>`;
    toast('連線失敗：' + e.message, 'error');
  }
}

function saveAndConnect() {
  localStorage.setItem('gas_url', document.getElementById('api-url').value.trim());
  loadData();
}

// ══════════════════════════════════════════════════════════
//  資料正規化
// ══════════════════════════════════════════════════════════
function normalise(item) {
  const g = (keys) => {
    for (const k of keys) if (item[k] !== undefined && item[k] !== '') return item[k];
    return '';
  };
  return {
    _row:       item._row,
    date:       item['日期'] ? new Date(item['日期']) : null,
    type:       g(['類型']),
    title:      g(['行程主題']),
    startTime:  g(['開始時間']),
    endTime:    g(['結束時間']),
    location:   g(['地點/連結']),
    priority:   g(['重要程度']) || '一般',
    recipients: g(['提醒對象\n（姓名，逗號分隔）','提醒對象']),
    groups:     g(['通知群組\n（群組名，逗號分隔）','通知群組']),
    note:       g(['備註']),
    notify7d:   toBool(g(['啟用\n7天前','啟用7天前'])),
    notify1d:   toBool(g(['啟用\n1天前','啟用1天前'])),
    notifyDay:  toBool(g(['啟用\n當天','啟用當天'])),
    sent7d:     toBool(g(['7天前\n已發送','7天前已發送'])),
    sent1d:     toBool(g(['1天前\n已發送','1天前已發送'])),
    sentDay:    toBool(g(['當天\n已發送','當天已發送'])),
    fixedSend:  toBool(g(['固定發送\n通知','固定發送通知'])),
    fixedDate:  g(['固定發送\n日期（每月幾號或每週幾）','固定發送日期']),
    status:     g(['通知狀態']),
  };
}
function toBool(v) { return v === true || v === 'TRUE' || v === 'true'; }

// ══════════════════════════════════════════════════════════
//  統計
// ══════════════════════════════════════════════════════════
function updateStats() {
  const today = new Date(); today.setHours(0,0,0,0);
  let soon=0, tod=0, fixed=0, pending=0;
  schedules.forEach(s => {
    if (s.fixedSend) { fixed++; }
    if (!s.date) return;
    const d = new Date(s.date); d.setHours(0,0,0,0);
    const diff = Math.round((d-today)/86400000);
    if (diff === 0) tod++;
    if (diff >= 0 && diff <= 7) soon++;
    if ((s.notify7d||s.notify1d||s.notifyDay) && !s.sentDay) pending++;
  });
  document.getElementById('s-total').textContent = schedules.length;
  document.getElementById('s-soon').textContent  = soon;
  document.getElementById('s-today').textContent = tod;
  document.getElementById('s-fixed').textContent = fixed;

  const badge = document.getElementById('badge-pending');
  if (pending > 0) { badge.style.display='flex'; badge.textContent=pending; }
  else badge.style.display='none';
}

// ══════════════════════════════════════════════════════════
//  篩選 & 渲染
// ══════════════════════════════════════════════════════════
function setFilter(mode, el) {
  filterMode = mode;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function renderList() {
  const q     = (document.getElementById('q').value || '').toLowerCase();
  const today = new Date(); today.setHours(0,0,0,0);

  let list = schedules.filter(s => {
    if (q && !((s.title+s.type+s.recipients+s.note).toLowerCase().includes(q))) return false;
    if (filterMode === 'fixed') return s.fixedSend;
    if (s.fixedSend) return filterMode === 'all';
    if (!s.date) return filterMode === 'all' || filterMode === 'past';
    const d = new Date(s.date); d.setHours(0,0,0,0);
    const diff = Math.round((d-today)/86400000);
    if (filterMode === 'all')      return true;
    if (filterMode === 'today')    return diff === 0;
    if (filterMode === 'upcoming') return diff > 0 && diff <= 14;
    if (filterMode === 'past')     return diff < 0;
    return true;
  }).sort((a,b) => {
    if (a.fixedSend !== b.fixedSend) return a.fixedSend ? -1 : 1;
    if (!a.date && !b.date) return 0;
    if (!a.date) return 1; if (!b.date) return -1;
    return a.date - b.date;
  });

  const el = document.getElementById('schedule-list');
  if (!list.length) {
    el.innerHTML = '<div class="empty"><div class="big">📭</div>沒有符合的行程</div>';
    return;
  }
  el.innerHTML = list.map(s => cardHTML(s, today)).join('');
}

function cardHTML(s, today) {
  let dayNum='–', monStr='', diffStr='', diffCls='', cardCls='';

  if (s.fixedSend) {
    dayNum='循'; monStr='固定'; diffStr=s.fixedDate||'–'; cardCls='is-fixed';
  } else if (s.date) {
    const d = new Date(s.date); d.setHours(0,0,0,0);
    const diff = Math.round((d-today)/86400000);
    dayNum = d.getDate(); monStr = (d.getMonth()+1)+'月';
    if (diff < 0)       { diffStr='已過期'; diffCls='past'; cardCls='is-past'; }
    else if (diff === 0){ diffStr='今天'; diffCls='is-today'; cardCls='is-today'; }
    else if (diff <= 3) { diffStr=diff+'天後'; cardCls='is-soon'; }
    else                 diffStr=diff+'天後';
  }

  const priCls = s.priority==='重要'?'重要':s.priority==='緊急'?'緊急':'';
  const stCls  = s.fixedSend ? 'sc-fixed'
    : (s.sentDay&&s.sent1d&&s.sent7d) ? 'sc-sent'
    : (s.notify7d||s.notify1d||s.notifyDay) ? 'sc-pending' : 'sc-waiting';
  const stTxt = s.fixedSend ? (s.notify7d||s.notify1d||s.notifyDay?'固定+提前':'固定發送')
    : (s.sentDay&&s.sent1d&&s.sent7d)?'全部已發'
    : stCls==='sc-pending'?'待發送':'等待中';

  const meta = [
    s.startTime ? s.startTime+(s.endTime?' – '+s.endTime:'') : '',
    s.location  ? '📍'+s.location : '',
    s.recipients? '👤'+s.recipients : '',
  ].filter(Boolean).join('　');

  // serialise for onclick
  const rowJson = s._row;

  return `<div class="scard ${cardCls}">
  <div class="scard-date">
    <div class="day">${dayNum}</div>
    <div class="mon">${monStr}</div>
    <div class="diff ${diffCls}">${diffStr}</div>
  </div>
  <div class="scard-body">
    <div class="scard-top">
      <span class="scard-title">${s.title||'（未命名）'}</span>
      ${s.type?`<span class="badge badge-type">${s.type}</span>`:''}
      <span class="badge badge-pri ${priCls}">${s.priority}</span>
      ${s.fixedSend?'<span class="badge badge-fixed">固定</span>':''}
    </div>
    ${meta?`<div class="scard-meta">${meta}</div>`:''}
    <div class="scard-foot">
      <div class="nb ${s.notify7d?'on':'off'}">7d</div>
      <div class="nb ${s.notify1d?'on':'off'}">1d</div>
      <div class="nb ${s.notifyDay?'on':'off'}">今</div>
      <span class="status-chip ${stCls}">${stTxt}</span>
      <div class="scard-actions">
        <button class="btn btn-outline btn-sm" onclick="openEditModal(${rowJson})">編輯</button>
        <button class="btn btn-warn btn-sm" onclick="openSendModal(${rowJson})">發送</button>
        <button class="btn btn-danger btn-sm" onclick="deleteItem(${rowJson})">刪除</button>
      </div>
    </div>
  </div>
</div>`;
}

// ══════════════════════════════════════════════════════════
//  聯絡人頁面
// ══════════════════════════════════════════════════════════
function renderContactPage() {
  const cEl = document.getElementById('contact-list');
  const gEl = document.getElementById('group-list');

  if (!contacts.length) {
    cEl.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:8px 0">尚無聯絡人</div>';
  } else {
    cEl.innerHTML = contacts.map(c => `
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px">
        <div style="width:36px;height:36px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:16px">👤</div>
        <div>
          <div style="font-weight:600;font-size:14px">${c.name}</div>
          <div style="font-size:12px;color:var(--muted)">${c.relation}${c.userId?'　<span style="font-family:var(--mono);font-size:10px">'+c.userId.slice(0,8)+'…</span>':''}</div>
        </div>
      </div>`).join('');
  }

  if (!groups.length) {
    gEl.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:8px 0">尚無群組</div>';
  } else {
    gEl.innerHTML = groups.map(g => `
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px">
        <div style="width:36px;height:36px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:16px">👥</div>
        <div>
          <div style="font-weight:600;font-size:14px">${g.name}</div>
          <div style="font-size:12px;color:var(--muted)">${g.purpose||''}${g.groupId?'　<span style="font-family:var(--mono);font-size:10px">'+g.groupId.slice(0,8)+'…</span>':''}</div>
        </div>
      </div>`).join('');
  }
}

// ══════════════════════════════════════════════════════════
//  快選 Chips
// ══════════════════════════════════════════════════════════
function buildQuickChips() {
  const cEl = document.getElementById('contact-quick');
  const gEl = document.getElementById('group-quick');
  cEl.innerHTML = contacts.map(c =>
    `<button class="contact-chip" onclick="appendRecipient('f-recipients','${c.name}')">${c.name}</button>`
  ).join('');
  gEl.innerHTML = groups.map(g =>
    `<button class="contact-chip" onclick="appendRecipient('f-groups','${g.name}')">${g.name}</button>`
  ).join('');
}
function appendRecipient(fieldId, name) {
  const el  = document.getElementById(fieldId);
  const val = el.value.trim();
  const arr = val ? val.split(/[,，]/).map(s=>s.trim()).filter(Boolean) : [];
  if (!arr.includes(name)) arr.push(name);
  el.value = arr.join(',');
}

// ══════════════════════════════════════════════════════════
//  新增 / 編輯 Modal
// ══════════════════════════════════════════════════════════
function openAddModal() {
  editRow = null;
  document.getElementById('modal-title').textContent = '新增行程';
  ['f-date','f-title','f-start','f-end','f-location','f-recipients','f-groups','f-note','f-fixed-date']
    .forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-type').value = '';
  document.getElementById('f-priority').value = '一般';
  ['f-n7d','f-n1d','f-nday','f-fixed'].forEach(id => document.getElementById(id).checked = false);
  document.getElementById('f-fixed-date').style.display = 'none';
  document.getElementById('modal-edit').classList.add('open');
}

function openEditModal(row) {
  const s = schedules.find(x => x._row === row);
  if (!s) return;
  editRow = row;
  document.getElementById('modal-title').textContent = '編輯行程';
  document.getElementById('f-date').value        = s.date ? s.date.toISOString().slice(0,10) : '';
  document.getElementById('f-type').value        = s.type;
  document.getElementById('f-title').value       = s.title;
  document.getElementById('f-start').value       = s.startTime;
  document.getElementById('f-end').value         = s.endTime;
  document.getElementById('f-location').value    = s.location;
  document.getElementById('f-priority').value    = s.priority;
  document.getElementById('f-recipients').value  = s.recipients;
  document.getElementById('f-groups').value      = s.groups;
  document.getElementById('f-note').value        = s.note;
  document.getElementById('f-n7d').checked       = s.notify7d;
  document.getElementById('f-n1d').checked       = s.notify1d;
  document.getElementById('f-nday').checked      = s.notifyDay;
  document.getElementById('f-fixed').checked     = s.fixedSend;
  document.getElementById('f-fixed-date').value  = s.fixedDate;
  document.getElementById('f-fixed-date').style.display = s.fixedSend ? 'block' : 'none';
  document.getElementById('modal-edit').classList.add('open');
}

function toggleFixed() {
  document.getElementById('f-fixed-date').style.display =
    document.getElementById('f-fixed').checked ? 'block' : 'none';
}

async function saveSchedule() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { toast('請填寫行程主題', 'error'); return; }

  const body = {
    action:     editRow ? 'update' : 'add',
    row:        editRow,
    date:       document.getElementById('f-date').value,
    type:       document.getElementById('f-type').value,
    title,
    startTime:  document.getElementById('f-start').value,
    endTime:    document.getElementById('f-end').value,
    location:   document.getElementById('f-location').value,
    priority:   document.getElementById('f-priority').value,
    recipients: document.getElementById('f-recipients').value,
    groups:     document.getElementById('f-groups').value,
    note:       document.getElementById('f-note').value,
    notify7d:   document.getElementById('f-n7d').checked,
    notify1d:   document.getElementById('f-n1d').checked,
    notifyDay:  document.getElementById('f-nday').checked,
    fixedSend:  document.getElementById('f-fixed').checked,
    fixedDate:  document.getElementById('f-fixed-date').value,
  };
  try {
    const res  = await fetch(API(), { method:'POST', body: JSON.stringify(body) });
    const data = await res.json();
    if (data.success) {
      closeModal('modal-edit');
      toast(editRow ? '已更新' : '已新增', 'success');
      await loadData();
    } else toast('儲存失敗：'+(data.error||''), 'error');
  } catch(e) { toast('錯誤：'+e.message, 'error'); }
}

// ══════════════════════════════════════════════════════════
//  發送 Modal
// ══════════════════════════════════════════════════════════
function openSendModal(row) {
  sendTarget = schedules.find(x => x._row === row);
  if (!sendTarget) return;

  document.getElementById('send-preview').textContent = buildPreview(sendTarget);

  const recips = (sendTarget.recipients||'').split(/[,，]/).map(s=>s.trim()).filter(Boolean);
  document.getElementById('send-recipients').innerHTML =
    recips.length
      ? recips.map(r=>`<span class="rchip">👤 ${r}</span>`).join('')
      : '<span class="rchip" style="color:var(--danger)">無收件人</span>';

  document.getElementById('modal-send').classList.add('open');
}

function buildPreview(s) {
  const dateStr = s.fixedSend ? '固定循環' : (s.date ? fmtDate(s.date) : '未設定');
  const lines = ['【行程提醒】',`主題：${s.title}`,`類型：${s.type}`,`日期：${dateStr}`];
  if (s.startTime) lines.push(`時間：${s.startTime}${s.endTime?' – '+s.endTime:''}`);
  if (s.location)  lines.push(`地點：${s.location}`);
  if (s.note)      lines.push(`備註：${s.note}`);
  return lines.join('\n');
}
function fmtDate(d) { return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`; }

async function confirmSend() {
  if (!sendTarget) return;
  const daysType = document.querySelector('input[name="stype"]:checked').value;
  const message  = document.getElementById('send-preview').textContent;
  try {
    const res  = await fetch(API(), { method:'POST', body: JSON.stringify({
      action:'send', row: sendTarget._row,
      recipients: sendTarget.recipients, message, daysType
    })});
    const data = await res.json();
    if (data.success) { closeModal('modal-send'); toast('通知已發送！', 'success'); await loadData(); }
    else toast('發送失敗：'+(data.error||''), 'error');
  } catch(e) { toast('錯誤：'+e.message, 'error'); }
}

// ══════════════════════════════════════════════════════════
//  刪除
// ══════════════════════════════════════════════════════════
async function deleteItem(row) {
  if (!confirm('確定要刪除這筆行程嗎？')) return;
  try {
    const res  = await fetch(API(), { method:'POST', body: JSON.stringify({ action:'delete', row }) });
    const data = await res.json();
    if (data.success) { toast('已刪除', 'success'); await loadData(); }
    else toast('刪除失敗', 'error');
  } catch(e) { toast('錯誤：'+e.message, 'error'); }
}

// ══════════════════════════════════════════════════════════
//  共用
// ══════════════════════════════════════════════════════════
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.overlay').forEach(el =>
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); })
);

let toastTimer;
function toast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 3000);
}
</script>
</body>
</html>
